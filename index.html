<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piscinas Verano Perfecto - Sistema de Gestión</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Estilos -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- ==================== LOGIN VIEW ==================== -->
    <div id="login-view" class="view active">
        <div class="login-card">
            <i class="fa-solid fa-water login-icon"></i>
            <h1>Verano Perfecto</h1>
            <p>Sistema de Gestión Integral V3.0</p>
            
            <form>
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" placeholder="RUT / Usuario" value="76.123.456-7">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="Contraseña" value="123456">
                </div>
                
                <div class="divider">Selecciona tu rol</div>
                
                <button type="button" class="btn-login btn-admin" onclick="loginAsAdmin()">
                    <i class="fa-solid fa-chart-line"></i> Ingresar como Admin
                </button>
                <button type="button" class="btn-login btn-tech" onclick="loginAsTech()">
                    <i class="fa-solid fa-truck-fast"></i> Ingresar como Técnico
                </button>
            </form>
        </div>
    </div>

    <!-- ==================== ADMIN VIEW ==================== -->
    <div id="admin-view" class="view">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-water"></i> Verano Perfecto
            </div>
            <ul class="nav-links">
                <li class="active" onclick="switchAdminSection('dashboard')">
                    <i class="fa-solid fa-house"></i> Dashboard
                </li>
                <li onclick="switchAdminSection('clientes')">
                    <i class="fa-solid fa-users"></i> Clientes
                </li>
                <li onclick="switchAdminSection('planificacion')">
                    <i class="fa-solid fa-map-location-dot"></i> Planificación
                </li>
                <li onclick="switchAdminSection('facturacion')">
                    <i class="fa-solid fa-file-invoice-dollar"></i> Facturación
                </li>
                <li onclick="switchAdminSection('inventario')">
                    <i class="fa-solid fa-boxes-stacked"></i> Inventario
                </li>
            </ul>
            <div class="logout-btn" onclick="logout()">
                <i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión
            </div>
        </nav>
        
        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <h2>Panel de Control</h2>
                <div class="user-profile">
                    <div class="avatar">A</div>
                    <span>Administrador</span>
                </div>
            </header>
            
            <div class="dashboard-content">
                <!-- Contenido dinámico -->
            </div>
        </main>
    </div>

    <!-- ==================== TECH VIEW ==================== -->
    <div id="tech-view" class="view">
        <div class="mobile-container">
            <header class="mobile-header">
                <div>
                    <h3>Hola, Diego</h3>
                    <p>Ruta del día: 3 visitas</p>
                </div>
                <div class="avatar" style="background-color: white; color: var(--primary);">DV</div>
            </header>
            
            <div class="route-list">
                <!-- Contenido dinámico -->
            </div>

            <nav class="mobile-nav">
                <div class="mobile-nav-item active" onclick="switchTecnicSection('ruta', this)">
                    <i class="fa-solid fa-list-check"></i>
                    Ruta
                </div>
                <div class="mobile-nav-item" onclick="switchTecnicSection('insumos', this)">
                    <i class="fa-solid fa-box"></i>
                    Insumos
                </div>
                <div class="mobile-nav-item" onclick="logout()">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    Salir
                </div>
            </nav>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/tech.js"></script>

</body>
</html>
